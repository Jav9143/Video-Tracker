[providers]
python = true

[variables]
NIXPACKS_PYTHON_VERSION = "3.11"

[phases.setup]
nixPkgs = ["python311", "gcc"]

[phases.build]
cmds = ["cd backend && python -m venv /opt/venv && . /opt/venv/bin/activate && pip install -r requirements.txt"]

[start]
cmd = "cd backend && . /opt/venv/bin/activate && uvicorn server:app --host 0.0.0.0 --port $PORT"
